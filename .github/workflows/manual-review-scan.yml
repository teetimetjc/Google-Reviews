name: Manual Review Scan (Places API)

on:
  # Paused: Places API only returns Google's "most relevant" top 5 reviews,
  # not guaranteed to be the newest — not good enough as a standing cron
  # until we find a better data source. See README "Manual scan" section.
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan-reviews:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Scan recent reviews
        env:
          PLACES_API_KEY: ${{ secrets.PLACES_API_KEY }}
          PLACE_ID: ${{ secrets.PLACE_ID }}
          BUSINESS_NAME: SOS Septic
          # Currently: false = notify on every new review, any rating.
          # Set to 'true' to go back to only flagging reviews under 5 stars.
          ONLY_FLAG_BELOW_5: 'false'
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: node src/places-check.js

      - name: Commit updated review state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          git diff --cached --quiet || git commit -m "Update Places review tracking state [skip ci]"
          git push
